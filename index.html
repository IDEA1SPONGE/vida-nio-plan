<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>维达项目作战 - 实时协作版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 配置与初始化 ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vida-nio-collab-v1';
        
        // 核心集合路径 (RULE 1)
        const tasksCollection = collection(db, 'artifacts', appId, 'public', 'data', 'tasks');

        // --- 全局状态 ---
        let tasks = [];
        let user = null;

        // --- UI 渲染函数 ---
        const renderAll = () => {
            // 严格按开始时间排序
            const sortedTasks = [...tasks].sort((a, b) => new Date(a.start) - new Date(b.start));
            renderTable(sortedTasks);
            renderGantt(sortedTasks);
        };

        const renderTable = (sortedTasks) => {
            const tbody = document.getElementById('taskTableBody');
            tbody.innerHTML = sortedTasks.map((task, index) => `
                <tr class="hover:bg-blue-50/20 transition-colors group border-b border-slate-50">
                    <td class="p-2 pl-4">
                        <input type="text" class="w-full bg-transparent p-1 border border-transparent hover:border-slate-200 focus:bg-white focus:border-blue-500 rounded outline-none text-xs" 
                               value="${task.name}" onchange="updateTaskRemote('${task.id}', 'name', this.value)">
                    </td>
                    <td class="p-2 text-center">
                        <input type="text" class="w-full bg-transparent p-1 text-center border border-transparent hover:border-slate-200 focus:bg-white focus:border-blue-500 rounded outline-none text-xs" 
                               value="${task.owner}" onchange="updateTaskRemote('${task.id}', 'owner', this.value)">
                    </td>
                    <td class="p-2 text-center">
                        <input type="date" class="w-full bg-transparent p-1 text-center border border-transparent hover:border-slate-200 focus:bg-white focus:border-blue-500 rounded outline-none text-[10px]" 
                               value="${task.start}" onchange="updateTaskRemote('${task.id}', 'start', this.value)">
                    </td>
                    <td class="p-2 text-center">
                        <input type="date" class="w-full bg-transparent p-1 text-center border border-transparent hover:border-slate-200 focus:bg-white focus:border-blue-500 rounded outline-none text-[10px]" 
                               value="${task.end}" onchange="updateTaskRemote('${task.id}', 'end', this.value)">
                    </td>
                    <td class="p-2 text-center no-print whitespace-nowrap">
                        <button onclick="insertTaskRemote(${index})" title="在此后插行" class="text-slate-300 hover:text-blue-500 opacity-0 group-hover:opacity-100 transition-all mr-2">
                           <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                        <button onclick="deleteTaskRemote('${task.id}')" title="删除" class="text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all">
                           <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </td>
                </tr>
            `).join('');
        };

        const renderGantt = (sortedTasks) => {
            const header = document.getElementById('ganttHeader');
            header.innerHTML = '<div class="p-2 text-center text-xs font-bold text-slate-400 border-r border-slate-200 bg-slate-100">云端实时轴</div>' + 
                Array.from({length: 30}, (_, i) => `<div class="text-center text-[10px] font-bold text-slate-400 py-2 border-l border-slate-100">${i+1}</div>`).join('');

            const body = document.getElementById('ganttBody');
            body.innerHTML = sortedTasks.map(task => {
                const s = parseInt(task.start.split('-')[2]) || 1;
                const e = parseInt(task.end.split('-')[2]) || 1;
                const span = Math.max(1, e - s + 1);
                const colors = { 1: 'from-blue-400 to-blue-600', 2: 'from-emerald-400 to-emerald-600', 3: 'from-amber-400 to-amber-600', 4: 'from-pink-400 to-pink-600', 5: 'from-purple-400 to-purple-600' };
                const bgClass = colors[task.phase || 2] || colors[2];

                return `
                    <div class="gantt-row-grid hover:bg-slate-50/50">
                        <div class="p-2 px-4 text-xs font-medium text-slate-700 truncate border-r border-slate-100" title="${task.name}">${task.name}</div>
                        <div class="relative flex items-center px-1" style="grid-column: ${s + 1} / span ${span}">
                            <div class="h-4 w-full rounded-full bg-gradient-to-r ${bgClass} shadow-sm text-[8px] text-white flex items-center px-2 font-bold truncate">
                                4.${s}-4.${e}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        };

        // --- 数据库操作 ---
        window.updateTaskRemote = async (id, field, value) => {
            if (!user) return;
            const taskDoc = doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id);
            await updateDoc(taskDoc, { [field]: value });
        };

        window.insertTaskRemote = async (index) => {
            if (!user) return;
            const sortedTasks = [...tasks].sort((a, b) => new Date(a.start) - new Date(b.start));
            const prev = sortedTasks[index];
            const newTask = {
                name: '新插入的任务项',
                owner: '待定',
                start: prev.start,
                end: prev.end,
                phase: prev.phase || 2,
                createdAt: Date.now()
            };
            await addDoc(tasksCollection, newTask);
        };

        window.addTaskRemote = async () => {
            if (!user) return;
            await addDoc(tasksCollection, {
                name: '末尾新任务项',
                owner: '待定',
                start: '2026-04-20',
                end: '2026-04-22',
                phase: 2,
                createdAt: Date.now()
            });
        };

        window.deleteTaskRemote = async (id) => {
            if (!user || !confirm('确定删除此协作任务项？')) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', id));
        };

        window.exportToExcel = () => {
            let csvContent = "\ufeff工作内容,负责人,开始日期,结束日期\n";
            const sortedTasks = [...tasks].sort((a, b) => new Date(a.start) - new Date(b.start));
            sortedTasks.forEach(t => {
                csvContent += `"${t.name.replace(/"/g, '""')}","${t.owner.replace(/"/g, '""')}","${t.start}","${t.end}"\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `维达尼奥项目作战图_${new Date().toLocaleDateString()}.csv`;
            link.click();
        };

        // --- 初始化 Auth & Firestore ---
        const init = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    document.getElementById('userIdDisplay').innerText = `协作 ID: ${user.uid}`;
                    onSnapshot(tasksCollection, (snapshot) => {
                        tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        if (tasks.length === 0) {
                            seedDataFromImage();
                        } else {
                            renderAll();
                        }
                    }, (err) => console.error("Firestore Error:", err));
                }
            });
        };

        // 根据图片 image_3455a6.jpg 初始化的 20 项数据
        const seedDataFromImage = async () => {
            const initial = [
                { name: '启动会 (确定爆点、分工)', owner: '上海团队', start: '2026-04-01', end: '2026-04-01', phase: 1 },
                { name: '素材包准备 (高清图/视频)', owner: '待定', start: '2026-04-07', end: '2026-04-10', phase: 1 },
                { name: '寻找两位家居、家电方面的小红书运营讲师', owner: '杨欣', start: '2026-04-07', end: '2026-04-10', phase: 1 },
                { name: '新产品“维达”培训', owner: '杨欣', start: '2026-04-07', end: '2026-04-30', phase: 1 },
                { name: '大众点评/美团优质点评赠品确定', owner: '张怡', start: '2026-04-07', end: '2026-04-17', phase: 2 },
                { name: '解决视频号流量转化 (1000粉丝，视频挂小黄车)', owner: '销售部', start: '2026-04-07', end: '2026-04-17', phase: 2 },
                { name: '视频号脚本 (例：“演绎顾客希望慢点装”)', owner: '销售部', start: '2026-04-07', end: '2026-04-10', phase: 2 },
                { name: '小程序优惠券配置 (新品尝新/以旧换新/超时券)', owner: '销售部', start: '2026-04-07', end: '2026-04-14', phase: 3 },
                { name: '小红书培训', owner: '运营讲师', start: '2026-04-13', end: '2026-04-13', phase: 1 },
                { name: '视频拍摄、剪辑，定时发布', owner: '销售部', start: '2026-04-13', end: '2026-04-17', phase: 2 },
                { name: '物料制作 (线上头图/超时券；线下海报立牌)', owner: '待定', start: '2026-04-13', end: '2026-04-17', phase: 2 },
                { name: '小红书账号矩阵搭建，第一批文章发布', owner: '品牌部', start: '2026-04-14', end: '2026-04-17', phase: 2 },
                { name: 'KOC/KOS 矩阵作战 (设计师、达人分享)', owner: 'Kiki总', start: '2026-04-14', end: '2026-04-30', phase: 2 },
                { name: '评论区转化 (引导私信、加微领券)', owner: '品牌部', start: '2026-04-14', end: '2026-04-30', phase: 2 },
                { name: '门店大屏播放视频 (预排冷实景演示)', owner: '运营部', start: '2026-04-14', end: '2026-04-30', phase: 4 },
                { name: '全链路监控与复盘', owner: '段连', start: '2026-04-14', end: '2026-04-30', phase: 5 },
                { name: '大众点评/美团、高德头图配置', owner: '品牌部', start: '2026-04-20', end: '2026-04-22', phase: 2 },
                { name: '线下门店物料立牌摆放', owner: '运营部', start: '2026-04-20', end: '2026-04-24', phase: 4 },
                { name: '线下落地活动 (线下香薰调试会)', owner: '上海团队', start: '2026-04-20', end: '2026-04-30', phase: 4 },
                { name: '高德地图、大众点评 (权益包与超时优惠券)', owner: '销售部', start: '2026-04-20', end: '2026-04-24', phase: 2 }
            ];
            for (const t of initial) {
                await addDoc(tasksCollection, { ...t, createdAt: Date.now() });
            }
        };

        // --- AI API ---
        const apiKey = ""; 
        window.askAI = async (type) => {
            const chatArea = document.getElementById('chatArea');
            const schedule = tasks.map(t => `- ${t.name} (${t.start} ~ ${t.end})`).join('\n');
            const prompt = type === 'risk' 
                ? `根据这份最新的 20 项排期数据，分析统筹风险（如：物料与培训时间重合、引流衔接等）：\n${schedule}`
                : `为维达尼奥花洒（爆点：预排冷、旧改速装）写一篇极具画面感的小红书种草笔记脚本。`;

            const loader = document.createElement('div');
            loader.className = "p-3 bg-indigo-50 rounded-xl text-xs animate-pulse font-bold text-indigo-600";
            loader.innerText = "Gemini 正在分析云端 20 项数据...";
            chatArea.appendChild(loader);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "你是资深项目指挥官。请用 Markdown 回答，逻辑清晰，语气果断专业。" }] }
                    })
                });
                const data = await res.json();
                loader.remove();
                const reply = document.createElement('div');
                reply.className = "bg-white border p-4 rounded-2xl text-sm shadow-sm leading-relaxed";
                reply.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                chatArea.appendChild(reply);
                chatArea.scrollTop = chatArea.scrollHeight;
            } catch (e) {
                loader.innerText = "AI 服务暂时不可用。";
            }
        };

        window.toggleAi = () => document.getElementById('aiPanel').classList.toggle('open');
        window.resetData = async () => {
            if(!confirm('该操作将清空云端当前所有任务，并重置为附件图片初始状态！')) return;
            for(const t of tasks) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', t.id));
            }
        };

        window.onload = init;
    </script>
    <style>
        .gantt-row-grid {
            display: grid; grid-template-columns: 320px repeat(30, minmax(24px, 1fr));
            border-bottom: 1px solid #f1f5f9; align-items: center; min-height: 38px;
        }
        #aiPanel { transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #aiPanel.open { transform: translateX(0); }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6 pb-20">
        <!-- 头部 -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-3xl shadow-md border border-slate-200">
            <div>
                <h1 class="text-2xl font-black text-slate-800 flex items-center gap-2 tracking-tight">
                    🚀 维达尼奥作战指挥舱
                    <span class="bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">云端 2.0 版</span>
                </h1>
                <p id="userIdDisplay" class="text-slate-400 text-[10px] font-mono mt-1 italic">正在连接...</p>
            </div>
            <div class="flex gap-2 no-print">
                <button onclick="addTaskRemote()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-2xl text-xs font-black shadow-lg shadow-blue-100 transition-all active:scale-95">
                    + 末尾新增
                </button>
                <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-2xl text-xs font-black shadow-lg shadow-emerald-100 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    下载 Excel
                </button>
                <button onclick="resetData()" class="text-slate-300 hover:text-rose-500 text-xs px-2 font-bold">一键重置</button>
            </div>
        </header>

        <!-- 表格区 -->
        <div class="bg-white rounded-3xl shadow-md border border-slate-200 overflow-hidden">
            <div class="p-4 bg-slate-50/80 border-b border-slate-200 flex justify-between items-center">
                <h2 class="text-xs font-black text-slate-500 uppercase tracking-widest">协作任务明细 (按时间自动重排)</h2>
                <span class="text-[10px] text-blue-500 font-bold animate-pulse">● 实时同步中</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-slate-400 border-b border-slate-100 font-bold bg-slate-50/30">
                            <th class="p-4 text-left">具体工作内容项</th>
                            <th class="p-4 text-center w-32">负责人</th>
                            <th class="p-4 text-center w-40">开始日期</th>
                            <th class="p-4 text-center w-40">结束日期</th>
                            <th class="p-4 text-center w-24 no-print">操作</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- 甘特图区 -->
        <div class="bg-white rounded-3xl shadow-md border border-slate-200 overflow-hidden">
            <div class="p-4 bg-slate-50/80 border-b border-slate-200 font-black text-slate-500 text-xs tracking-widest uppercase">全链路进度实时图</div>
            <div class="overflow-x-auto bg-white">
                <div class="min-w-[1400px]">
                    <div class="gantt-row-grid bg-slate-100/50" id="ganttHeader"></div>
                    <div id="ganttBody" class="py-2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI 悬浮 -->
    <button onclick="toggleAi()" class="fixed bottom-8 right-8 w-16 h-16 bg-gradient-to-tr from-blue-600 to-indigo-700 text-white rounded-2xl shadow-2xl flex items-center justify-center hover:scale-110 transition-all z-50 no-print group">
        <span class="text-3xl group-hover:rotate-12 transition-transform">✨</span>
    </button>

    <!-- AI 面板 -->
    <div id="aiPanel" class="fixed top-0 right-0 h-screen w-full md:w-[480px] bg-white shadow-2xl z-[60] flex flex-col no-print border-l border-slate-200">
        <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-2xl">✨</span>
                <h3 class="font-black tracking-tight text-lg">指挥官助手</h3>
            </div>
            <button onclick="toggleAi()" class="text-slate-400 hover:text-white transition-colors">✕</button>
        </div>
        <div class="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-50" id="chatArea"></div>
        <div class="p-4 border-t bg-white grid grid-cols-2 gap-3">
            <button onclick="askAI('risk')" class="p-4 border border-slate-200 rounded-2xl text-xs font-black hover:bg-blue-50 hover:border-blue-200 transition-all flex flex-col items-center gap-2">
                <span class="text-lg">⚠️</span> 分析风险
            </button>
            <button onclick="askAI('copy')" class="p-4 border border-slate-200 rounded-2xl text-xs font-black hover:bg-emerald-50 hover:border-emerald-200 transition-all flex flex-col items-center gap-2">
                <span class="text-lg">✍️</span> 笔记脚本
            </button>
        </div>
    </div>

</body>
</html>
